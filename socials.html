<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  
    <title>Platforms and Socials - Luiscancode.com</title>
    
    <style>
        
        *{
            padding: 0;
            margin: 0;
            font-family: "Libre Franklin", sans-serif;
            background-repeat: no-repeat;
        }
        #lLogo{
            padding-left: 10px;
            display:grid;

        }
        body{
       
        min-height: 100vh;
        width: 100%;
        background: linear-gradient(rgba(157, 8, 8, 0.601), rgba(173, 43, 14, 0.298)), url(/resources/images/meandteddy2.jpg) center/cover no-repeat;
        position:relative;
            
        }
        .mainTitle{
            color: white;
            align-items: center;
            text-align: center;
            margin: 20px;
            padding-bottom: 10vh;
    
        }
     .mainSection {
        color: white;
        height: 40vh;
        justify-content: center;
        margin-top: 20vh;
        align-items: center;

        background-color: rgba(195, 58, 54, 0.745);
        border-radius: 20px;
        width: 60%;
        margin: 100px auto; /* centers horizontally */
        padding: 10px;
        text-align: center;
}
        .mainSection h2{
            margin: 20px;
            padding: 20px;
            font-size: 30px;
            padding-top: 5vh;

        }
        .mainSection p{
            font-size: 20px;
        }
        .mainSection a{
            font-size: 30px;
            padding-top: 30px;
            margin: 7px;
            text-decoration: none;
        }

        .resumedwnld{
            font-family: "Libre Franklin", sans-serif;
        
            align-items: center;
            text-align: center;
            padding: 20px;
            margin: 5px;


        }
        .resumedwnld button{
             color: whitesmoke;
             font-weight: 500;
            background-color: rgba(165, 21, 21, 0.902);
            font-size: 25px;
            border-radius: 10px;
            padding: 10px;
            border-style: none;
            width: fit-content;
            transition: .4s;

        }
          .resumedwnld button:hover{
            background-color: rgba(213, 32, 22, 0.922);
            color: whitesmoke;
            transition: .3s;
            cursor: pointer;
        }
        #github{
            color: black;
            transition: .4s;
        }
         #github:hover{
            transition: .5s;
            color: rgb(255, 255, 255);
        }
        #linkedin{
            color: rgb(43, 94, 211);
            transition: .3s;
        }
        #linkedin:hover{
             transition: .5s;
            color: rgb(147, 179, 255);

        }
        #instagram{
            transition: .3s;
            color: rgba(248, 20, 73, 0.974);
        }
         #instagram:hover{
            transition: .3s;
            color: rgb(254, 111, 44);
        }
        #facebook{
            transition: .3s;
            color: rgba(44, 44, 243, 0.907);
        }
          #facebook:hover{
            transition: .4s;
            color: rgba(37, 144, 220, 0.971);
        }
        #youtube{
            transition: .3s;
            color: red;
        }
         #youtube:hover{
            transition: .4s;
            color: rgb(255, 147, 147);
        }
        
@media screen and (max-width: 430px) {

    #lLogo{
        justify-content: center;
        padding-left: 0;
        margin-top: 15px;
    }

    #lLogo img{
        width: 90px;
        height: auto;
    }

    .mainSection{
        width: 90%;
        height: auto;
        margin-top: 40px;
        padding: 20px 15px;
    }

    .mainSection h2{
        font-size: 24px;
        margin: 10px 0;
        padding: 0;
    }

    .mainSection p{
        font-size: 16px;
        line-height: 1.5;
        margin-top: 10px;
    }

    .mainSection a{
        font-size: 34px;
        margin: 14px 10px;
        display: inline-block;
    }

    .resumedwnld{
        margin-top: 20px;
        padding-bottom: 30px;
    }

    .resumedwnld button{
        width: 85%;
        font-size: 20px;
        padding: 14px;
        border-radius: 12px;
    }
}
    </style>
</head>
<body>
<div>

    <nav id="lLogo">
            <a href="index.html"><img src="/resources/images/L logo png.png" alt="L-Logo"></a>
        </nav>
</div>
        

        <div class="mainSection">
        <h2>Welcome to my socials!</h2>
        <p>Under this section you will be able to find some of the socials that I find myself active in. <br> Feel free to send a message or visit my socials to see some of my work!</p>
        <a href="https://github.com/las6nia" class="fa fa-github" id="github"></a>
        <a href="https://www.instagram.com/luis._.roblero_/" class="fa fa-instagram" id="instagram"></a>
        <a href="https://www.facebook.com/profile.php?id=61576674119948" class="fa fa-facebook" id="facebook"></a>
        <a href="https://www.linkedin.com/in/lalcala/" class="fa fa-linkedin" id="linkedin"></a>

        <a href="https://www.youtube.com/@RobleroVlogs" class="fa fa-youtube" id="youtube"></a>
    </div>

   <div class="resumedwnld">
  <button onclick="downloadResume()">Resume</button>
</div>

<script>
function downloadResume() {
  const link = document.createElement('a');
  link.href = '/resources/images/lalcalaResume.pdf';
  link.download = 'lalcalaResume.pdf';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
</script>
</script>
</body>
</html>
